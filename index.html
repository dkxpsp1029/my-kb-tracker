<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>키보드 통합 추적기 V3.1</title>
    <style>
        :root { --primary: #1a73e8; --reddit: #ff4500; --geekhack: #4b5563; --korea: #ef4444; }
        body { font-family: -apple-system, sans-serif; background: #f3f4f6; margin: 0; padding: 15px; }
        .app-card { max-width: 600px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .tabs { display: flex; background: #f9fafb; border-bottom: 1px solid #e5e7eb; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-size: 13px; font-weight: bold; color: #6b7280; border-bottom: 3px solid transparent; }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); background: white; }
        .item { display: flex; padding: 15px; border-bottom: 1px solid #f3f4f6; text-decoration: none; color: #1f2937; align-items: center; }
        .item:hover { background: #f9fafb; }
        .badge { font-size: 10px; padding: 3px 8px; border-radius: 4px; color: white; margin-right: 12px; font-weight: bold; min-width: 65px; text-align: center; }
        .bg-reddit { background: var(--reddit); } .bg-geekhack { background: var(--geekhack); } .bg-korea { background: var(--korea); }
        .info { flex: 1; } .title { font-size: 14px; font-weight: 600; line-height: 1.4; display: block; margin-bottom: 4px; }
        .date { font-size: 11px; color: #9ca3af; }
        .loading { padding: 80px; text-align: center; color: #9ca3af; }
    </style>
</head>
<body>
<div class="app-card">
    <header><h2 style="margin:0; font-size:18px;">⌨️ 키보드 통합 추적기 V3.1</h2></header>
    <div class="tabs">
        <div id="tab-all" class="tab active" onclick="changeTab('all')">전체보기</div>
        <div id="tab-korea" class="tab" onclick="changeTab('korea')">🇰🇷 한국/아시아</div>
        <div id="tab-geekhack" class="tab" onclick="changeTab('geekhack')">🌐 Geekhack</div>
    </div>
    <div id="list-container"><div class="loading">구글 보안 엔진으로 데이터를 가져오는 중...</div></div>
</div>

<script>
    let allItems = [];
    let currentTab = 'all';
    const KR_KEYWORDS = ["kr", "korea", "geon", "swag", "funs", "knd", "asia", "지온", "스웨그", "펀키스", "상우", "tx", "monsta"];

    async function loadData() {
        const container = document.getElementById('list-container');
        const redditUrl = 'https://www.reddit.com/r/MechGroupBuys/new.rss';
        const ghUrl = 'https://geekhack.org/index.php?type=rss;action=news;board=70.0';

        // 구글 Feed API 우회 스크립트 (가장 강력함)
        const googleFeedUrl = (rssUrl) => `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&api_key=oyebv9yqf0e340asf6skw7sqfzyh8wpxofaxpzn9`;

        try {
            const results = await Promise.all([
                fetch(googleFeedUrl(redditUrl)).then(r => r.json()),
                fetch(googleFeedUrl(ghUrl)).then(r => r.json())
            ]);

            const redditItems = (results[0].items || []).map(i => ({ ...i, source: 'Reddit' }));
            const ghItems = (results[1].items || []).map(i => ({ ...i, source: 'Geekhack' }));
            
            allItems = [...redditItems, ...ghItems].sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
            render();
        } catch (e) {
            container.innerHTML = '<div class="loading">데이터 로드 실패. 1분 뒤 새로고침 해주세요.</div>';
        }
    }

    function render() {
        const container = document.getElementById('list-container');
        container.innerHTML = '';
        
        let filtered = allItems;
        if (currentTab === 'korea') {
            filtered = allItems.filter(i => KR_KEYWORDS.some(k => i.title.toLowerCase().includes(k)));
        } else if (currentTab === 'geekhack') {
            filtered = allItems.filter(i => i.source === 'Geekhack');
        }

        if (filtered.length === 0 && allItems.length > 0) {
            container.innerHTML = '<div class="loading">해당하는 데이터가 없습니다.</div>';
            return;
        } else if (allItems.length === 0) {
            container.innerHTML = '<div class="loading">수집된 데이터가 없습니다.</div>';
            return;
        }

        filtered.forEach(item => {
            const isKR = KR_KEYWORDS.some(k => item.title.toLowerCase().includes(k));
            let badgeClass = item.source === 'Reddit' ? 'bg-reddit' : 'bg-geekhack';
            let badgeText = item.source.toUpperCase();

            if (isKR) {
                badgeClass = 'bg-korea';
                badgeText = 'KOREA';
            }

            container.insertAdjacentHTML('beforeend', `
                <a href="${item.link}" target="_blank" class="item">
                    <span class="badge ${badgeClass}">${badgeText}</span>
                    <div class="info">
                        <span class="title">${item.title}</span>
                        <span class="date">${item.pubDate}</span>
                    </div>
                </a>
            `);
        });
    }

    function changeTab(type) {
        currentTab = type;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + type).classList.add('active');
        render();
    }

    loadData();
</script>
</body>
</html>
