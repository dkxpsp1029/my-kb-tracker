<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>키보드 통합 추적기 (포털형)</title>
    <style>
        :root { --primary: #1a73e8; --reddit: #ff4500; --geekhack: #4b5563; }
        body { font-family: -apple-system, sans-serif; background: #f3f4f6; margin: 0; padding: 15px; }
        .app-card { max-width: 500px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .link-list { padding: 20px; }
        .btn { display: flex; align-items: center; justify-content: space-between; padding: 18px; margin-bottom: 12px; border-radius: 10px; text-decoration: none; color: white; font-weight: bold; transition: 0.2s; }
        .btn:hover { opacity: 0.9; transform: scale(1.02); }
        .bg-reddit { background: var(--reddit); }
        .bg-geekhack { background: var(--geekhack); }
        .bg-korea { background: #34a853; }
        .desc { font-size: 12px; font-weight: normal; opacity: 0.8; margin-top: 4px; display: block; }
    </style>
</head>
<body>
<div class="app-card">
    <header><h2 style="margin:0">⌨️ 키보드 통합 포털</h2></header>
    <div class="link-list">
        <a href="https://www.reddit.com/r/MechGroupBuys/new/" target="_blank" class="btn bg-reddit">
            <div>🚀 Reddit 실시간 공제<span class="desc">r/MechGroupBuys 최신글 바로가기</span></div>
            <span>▶</span>
        </a>
        <a href="https://geekhack.org/index.php?board=70.0" target="_blank" class="btn bg-geekhack">
            <div>🌐 Geekhack 공식 포럼<span class="desc">전 세계 키보드 공제 원문 확인</span></div>
            <span>▶</span>
        </a>
        <a href="https://duckduckgo.com/?q=geonworks+swagkeys+funs+keyboard+gb&t=h_&ia=web" target="_blank" class="btn bg-korea">
            <div>🇰🇷 한국/아시아 통합 검색<span class="desc">국내 벤더 최신 소식 모아보기</span></div>
            <span>▶</span>
        </a>
    </div>
    <div style="text-align:center; padding-bottom:20px; color:#999; font-size:12px;">보안 프로그램 차단 시 이 포털형을 사용하세요.</div>
</div>
</body>
</html>
